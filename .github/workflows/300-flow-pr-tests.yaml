name: "300: [FLOW] PR Tests"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    uses: ./.github/workflows/800-call-run-unit-tests.yaml

  integration-tests:
    needs: [unit-tests]
    uses: ./.github/workflows/800-call-run-integration-tests.yaml
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # Runs in parallel with integration-tests on a separate runner. Both jobs spin
  # up their own Solo network so they don't share state. Cuts PR feedback time
  # roughly in half at the cost of 2× CI minutes for the test phase.
  e2e-tests:
    needs: [unit-tests]
    uses: ./.github/workflows/800-call-run-e2e-tests.yaml
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
