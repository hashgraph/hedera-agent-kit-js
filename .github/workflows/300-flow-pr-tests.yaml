name: "300: [FLOW] PR Tests"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    uses: ./.github/workflows/800-call-run-unit-tests.yaml

  integration-tests:
    needs: [unit-tests]
    uses: ./.github/workflows/800-call-run-integration-tests.yaml
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  e2e-tests:
    needs: [integration-tests]
    uses: ./.github/workflows/800-call-run-e2e-tests.yaml
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
